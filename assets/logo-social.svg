<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Red Stone Studio Logo">
  <!--
    Red Stone Studio — Social Media Logo
    800×800 · Safe for circular crop (all key marks within r=300 from center)
    Export to PNG at 800×800 for Facebook / Google / LinkedIn / Instagram
  -->
  <defs>

    <!-- ── Background radial glow ── -->
    <radialGradient id="bgGlow" cx="50%" cy="46%" r="44%">
      <stop offset="0%"   stop-color="#C0392B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Vignette (darkens edges for premium look) ── -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0A0A0F" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- ── Gem facet gradients (lit from above-left) ── -->
    <!-- Top-left: brightest — catching main light -->
    <linearGradient id="tl" gradientUnits="userSpaceOnUse"
        x1="160" y1="115" x2="400" y2="370">
      <stop offset="0%"   stop-color="#F06858"/>
      <stop offset="100%" stop-color="#B03A2E"/>
    </linearGradient>

    <!-- Top-right: medium — partial light -->
    <linearGradient id="tr" gradientUnits="userSpaceOnUse"
        x1="640" y1="115" x2="400" y2="370">
      <stop offset="0%"   stop-color="#D44535"/>
      <stop offset="100%" stop-color="#BF3B2B"/>
    </linearGradient>

    <!-- Bottom-left: dark — shadow side -->
    <linearGradient id="bl" gradientUnits="userSpaceOnUse"
        x1="160" y1="370" x2="400" y2="635">
      <stop offset="0%"   stop-color="#8E2010"/>
      <stop offset="100%" stop-color="#5A1410"/>
    </linearGradient>

    <!-- Bottom-right: darkest — deep shadow -->
    <linearGradient id="br" gradientUnits="userSpaceOnUse"
        x1="640" y1="370" x2="400" y2="635">
      <stop offset="0%"   stop-color="#6B1510"/>
      <stop offset="100%" stop-color="#3D0D0B"/>
    </linearGradient>

    <!-- ── Gold crown accent ── -->
    <linearGradient id="goldCrown" gradientUnits="userSpaceOnUse"
        x1="335" y1="210" x2="465" y2="210">
      <stop offset="0%"   stop-color="#E67E22"/>
      <stop offset="45%"  stop-color="#FDEBD0"/>
      <stop offset="100%" stop-color="#F39C12"/>
    </linearGradient>

    <!-- ── Center jewel ── -->
    <radialGradient id="jewel" cx="48%" cy="35%" r="62%">
      <stop offset="0%"   stop-color="#FDEBD0"/>
      <stop offset="30%"  stop-color="#F5B041"/>
      <stop offset="100%" stop-color="#C87D0E"/>
    </radialGradient>

    <!-- ── Specular flash on TL facet ── -->
    <linearGradient id="specular" gradientUnits="userSpaceOnUse"
        x1="220" y1="115" x2="400" y2="310">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- ── Gem glow filter ── -->
    <filter id="gemGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Outer halo (red aura behind gem) ── -->
    <filter id="halo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="38" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ── Gem outline glow (thin red line that glows) ── -->
    <filter id="strokeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══════════════════════════════
       BACKGROUND
       ═══════════════════════════════ -->
  <rect width="800" height="800" fill="#0A0A0F"/>

  <!-- Background radial glow (red warmth behind gem) -->
  <ellipse cx="400" cy="385" rx="290" ry="268" fill="url(#bgGlow)"/>

  <!-- ═══════════════════════════════
       GEM RED AURA
       ═══════════════════════════════ -->
  <polygon points="400,115 640,370 400,635 160,370"
    fill="#C0392B" opacity="0.09" filter="url(#halo)"/>

  <!-- ═══════════════════════════════
       GEM BODY
       ═══════════════════════════════ -->
  <g filter="url(#gemGlow)">

    <!-- 4 main facets -->
    <polygon points="400,115 160,370 400,370" fill="url(#tl)"/>
    <polygon points="400,115 640,370 400,370" fill="url(#tr)"/>
    <polygon points="160,370 400,635 400,370" fill="url(#bl)"/>
    <polygon points="640,370 400,635 400,370" fill="url(#br)"/>

    <!-- Specular highlight — upper-left facet catching direct light -->
    <polygon points="400,115 240,296 400,296" fill="url(#specular)"/>

    <!-- Internal structure lines -->
    <line x1="400" y1="115" x2="400" y2="635"
          stroke="rgba(255,255,255,0.065)" stroke-width="1.5"/>
    <line x1="160" y1="370" x2="640" y2="370"
          stroke="rgba(255,255,255,0.065)" stroke-width="1.5"/>

    <!-- Crown facet detail lines (fine engraving) -->
    <line x1="400" y1="115" x2="276" y2="242"
          stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
    <line x1="400" y1="115" x2="524" y2="242"
          stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

    <!-- Pavilion detail lines -->
    <line x1="400" y1="635" x2="276" y2="498"
          stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="400" y1="635" x2="524" y2="498"
          stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- ── Gold crown accent triangle ── -->
    <polygon points="400,115 464,213 336,213" fill="url(#goldCrown)" opacity="0.78"/>

    <!-- ── Center jewel ── -->
    <polygon points="400,213 473,311 400,409 327,311" fill="url(#jewel)"/>
    <!-- Jewel crown facet (lighter top half) -->
    <polygon points="400,213 473,311 400,311 327,311" fill="white" opacity="0.20"/>
    <!-- Jewel center hairline -->
    <line x1="400" y1="213" x2="400" y2="409"
          stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
    <line x1="327" y1="311" x2="473" y2="311"
          stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

  </g>

  <!-- ═══════════════════════════════
       GEM BORDERS
       ═══════════════════════════════ -->
  <!-- Main red outline with glow -->
  <polygon points="400,115 640,370 400,635 160,370"
    stroke="#E74C3C" stroke-width="2" fill="none" opacity="0.55"
    filter="url(#strokeGlow)"/>

  <!-- Gold dashed accent border -->
  <polygon points="400,115 640,370 400,635 160,370"
    stroke="#F39C12" stroke-width="1" fill="none" opacity="0.28"
    stroke-dasharray="28 52"/>

  <!-- Subtle outer halo rings -->
  <polygon points="400,101 654,370 400,649 146,370"
    stroke="#E74C3C" stroke-width="1" fill="none" opacity="0.09"/>
  <polygon points="400,88 668,370 400,662 132,370"
    stroke="#E74C3C" stroke-width="0.6" fill="none" opacity="0.045"/>

  <!-- ═══════════════════════════════
       SPARKLE — top gem point
       ═══════════════════════════════ -->
  <g opacity="0.65">
    <line x1="400" y1="88"  x2="400" y2="104" stroke="white" stroke-width="1.2"/>
    <line x1="392" y1="96"  x2="408" y2="96"  stroke="white" stroke-width="1.2"/>
    <line x1="394" y1="90"  x2="406" y2="102" stroke="white" stroke-width="0.7"/>
    <line x1="406" y1="90"  x2="394" y2="102" stroke="white" stroke-width="0.7"/>
  </g>

  <!-- ═══════════════════════════════
       WORDMARK
       ═══════════════════════════════ -->
  <text x="400" y="693"
    font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
    font-size="54" letter-spacing="14"
    fill="#F0EDE8" text-anchor="middle" opacity="0.92">RED STONE</text>
  <text x="400" y="726"
    font-family="'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif"
    font-size="22" letter-spacing="18"
    fill="#A8A3A0" text-anchor="middle" opacity="0.75">STUDIO</text>

  <!-- ═══════════════════════════════
       VIGNETTE OVERLAY
       ═══════════════════════════════ -->
  <rect width="800" height="800" fill="url(#vignette)"/>

</svg>
