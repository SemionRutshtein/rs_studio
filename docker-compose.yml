services:
  server:
    build: ./server
    env_file: .env
    environment:
      PORT: 3001
    expose:
      - "3001"
    restart: unless-stopped

  client:
    build: ./client
    environment:
      PORT: 80
      SERVER_URL: http://server:3001
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
