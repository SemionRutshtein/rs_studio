version: '3.8'
services:
  server:
    build: ./server
    env_file: .env
    expose:
      - "3001"
    restart: unless-stopped

  client:
    build:
      context: .                  # repo root — so Dockerfile can access nginx/nginx.conf
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
